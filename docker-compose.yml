version: "3.9"

services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: opsbrief_app
    env_file:
      - .env
    volumes:
      - sqlite_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - opsbrief_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: opsbrief_redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - opsbrief_network
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-opsbrief}
    command: redis-server --requirepass ${REDIS_PASSWORD:-opsbrief}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  db:
    image: postgres:15-alpine
    container_name: opsbrief_db
    env_file:
      - .env
    environment:
      POSTGRES_DB: opsbrief
      POSTGRES_USER: opsbrief
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - opsbrief_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opsbrief -d opsbrief"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  nginx:
    image: nginx:alpine
    container_name: opsbrief_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - app
    networks:
      - opsbrief_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: opsbrief_celery_worker
    command: celery -A opsbrief.celery_app:celery_app worker --loglevel=info
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - opsbrief_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A opsbrief.celery_app:celery_app inspect ping --destination celery@$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: opsbrief_celery_beat
    command: celery -A opsbrief.celery_app:celery_app beat --loglevel=info --schedule=/app/celerybeat-data/celerybeat-schedule
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    volumes:
      - celery_beat_data:/app/celerybeat-data
    networks:
      - opsbrief_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep '[c]elery beat' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  celery_beat_data:
    driver: local
  sqlite_data:
    driver: local

networks:
  opsbrief_network:
    driver: bridge
