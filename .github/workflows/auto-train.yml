name: Auto-Train Knowledge AI

# Runs:
#   1. Daily at 04:00 UTC (cron) — retrains even if nothing changed
#   2. On every push that touches knowledge files or the trainer
#   3. Manually via workflow_dispatch

on:
  schedule:
    - cron: "0 4 * * *"          # daily at 04:00 UTC
  push:
    paths:
      - "knowledge_base.py"
      - "train_knowledge.py"
      - "vectorizer.py"
      - "neural_network.py"
      - "data/extra_knowledge/*.json"
  workflow_dispatch:               # manual trigger from Actions tab

permissions:
  contents: write                  # needs write to commit updated models

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests first
        run: python -m pytest tests/ -v

      - name: Train knowledge model
        run: python train_knowledge.py --epochs 3000

      - name: Show model stats
        run: |
          echo "=== Model files ==="
          ls -lh models/
          echo ""
          echo "=== Answer map entries ==="
          python -c "import json; d=json.load(open('models/answer_map.json')); print(f'{len(d)} answers')"
          echo ""
          echo "=== Vocab size ==="
          python -c "import json; d=json.load(open('models/vectorizer.json')); print(f'{len(d[\"vocab\"])} words')"

      - name: Commit updated models
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add models/
          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No model changes to commit."
          else
            git commit -m "chore(auto-train): retrain knowledge model [skip ci]

          Trained on $(python -c "from knowledge_base import KNOWLEDGE; print(len(KNOWLEDGE))") knowledge entries
          $(python -c "import json; d=json.load(open('models/answer_map.json')); print(f'{len(d)} answer classes')")
          $(python -c "import json; d=json.load(open('models/vectorizer.json')); print(f'{len(d[\"vocab\"])} vocab words')")"
            git push
          fi
